<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Large note icon for splash screen -->
  <rect x="80" y="60" width="240" height="280" rx="20" fill="#4A90E2"/>
  
  <!-- Folded corner -->
  <path d="M 80 60 L 80 140 L 160 60 Z" fill="#357ABD"/>
  
  <!-- White paper inside -->
  <rect x="120" y="100" width="160" height="200" rx="12" fill="#FFFFFF"/>
  
  <!-- Lines on note -->
  <line x1="140" y1="140" x2="260" y2="140" stroke="#4A90E2" stroke-width="12" stroke-linecap="round"/>
  <line x1="140" y1="180" x2="260" y2="180" stroke="#4A90E2" stroke-width="12" stroke-linecap="round"/>
  <line x1="140" y1="220" x2="240" y2="220" stroke="#4A90E2" stroke-width="12" stroke-linecap="round"/>
  <line x1="140" y1="260" x2="260" y2="260" stroke="#4A90E2" stroke-width="12" stroke-linecap="round"/>
  <line x1="140" y1="300" x2="220" y2="300" stroke="#4A90E2" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Pen icon -->
  <path d="M 240 320 L 280 360 L 260 380 L 220 340 Z" fill="#FF6B6B"/>
  <path d="M 280 360 L 300 380 L 280 400 L 260 380 Z" fill="#FF5252"/>
  <circle cx="250" cy="330" r="8" fill="#FFFFFF"/>
</svg>
